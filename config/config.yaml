# HKJC Edge Tool — central configuration.
# Single source of truth for the data pipeline. Secrets go in .env (see .env.example).
# All paths are relative to the project root unless absolute.

project:
  name: hkjc-edge-tool
  timezone: Asia/Hong_Kong          # HKJC race times are HKT

database:
  path: data/hkjc.sqlite            # local SQLite DB (gitignored)

http:
  # --- Politeness / rate limiting (be a good citizen; HKJC ToS leans restrictive) ---
  base_delay_seconds: 4.0           # minimum wait between requests to the same host
  jitter_seconds: 2.0               # random extra [0, jitter] added to each delay
  timeout_seconds: 30
  max_retries: 3
  backoff_factor: 2.0               # exponential backoff multiplier on retry
  respect_robots: true              # honour robots.txt (per-host, cached)
  max_requests_per_run: 600         # HARD safety cap; the client refuses to exceed this
  # Honest, identifiable UA by default. If HKJC blocks it, a browser UA can be set here,
  # but prefer staying identifiable. Set a real contact in <contact>.
  user_agent: "hkjc-edge-research/0.1 (personal research; non-redistributing; contact:<set-in-config>)"
  # On-disk HTTP cache so re-runs don't re-hit HKJC. Historical results are immutable,
  # so a long TTL is safe; live odds use ttl 0 (never cached).
  cache_dir: data/cache
  cache_ttl_hours: 336              # 14 days

sources:
  hkjc_racing:
    enabled: true
    base_url: https://racing.hkjc.com
    results_path: /en-us/local/information/localresults       # racedate=YYYY/MM/DD
    racecard_path: /en-us/local/information/racecard          # racedate=YYYY/MM/DD
    sectional_path: /en-us/local/information/displaysectionaltime  # racedate=DD/MM/YYYY (note format!)
  hkjc_odds:
    # Live odds via reverse-engineered GraphQL. Disabled by default: the endpoint uses
    # WHITELISTED queries (returns WHITELIST_ERROR otherwise), so the correct persisted
    # query/operation must be supplied. Used only for going-forward odds-movement capture.
    enabled: false
    graphql_url: https://info.cld.hkjc.com/graphql/base/
    poll_interval_seconds: 60
    operation_name: racing            # placeholder; must match a whitelisted op
  csv_import:
    # Bulk historical seed (e.g. Kaggle 'gdaley/hkracing': races.csv + runs.csv).
    enabled: true

ingest:
  default_racecourses: [ST, HV]       # Sha Tin, Happy Valley (CH = Conghua trials)

# Phase 4 runtime app. The edge gate is OFF because Phase 3 validation returned NO-GO.
# With the gate off the recommender ALWAYS outputs NO BET (the honest default). Turning it
# on bets against the validation evidence — do not unless a real edge has been established.
app:
  edge_gate_enabled: false
  ev_threshold: 0.10                  # require >=10% EV over takeout before even considering a bet
  bankroll:
    starting_bankroll: 1000.0
    kelly_fraction: 0.25              # fractional (1/4) Kelly
    per_bet_cap_frac: 0.02            # max single bet = 2% of bankroll
    per_race_cap_frac: 0.04           # max total stake in one race (win bets are exclusive)
    total_exposure_cap_frac: 0.10     # max session exposure = 10% of starting bankroll
    session_loss_limit_frac: 0.10     # stop the session after a 10% loss
    stop_loss_frac: 0.25              # hard stop if bankroll falls 25% below start

# Pool takeout / commission rates (fraction HKJC retains). Source: research_report.md §2
# (HKJC official betting guides, 2024-2026 season). Used by EV/Kelly math in later phases.
takeout:
  WIN: 0.175
  PLACE: 0.175
  QIN: 0.175      # Quinella
  QPL: 0.175      # Quinella Place
  DBL: 0.175      # Double
  FCT: 0.195      # Forecast
  TRI: 0.23       # Trio
  TCE: 0.25       # Tierce
  F4: 0.25        # First 4
  QTT: 0.25       # Quartet
  TBL: 0.25       # Treble
  TT: 0.175       # Triple Trio (true commission; +7.5% to jackpot reserve)
  DT: 0.245       # Double Trio (~, incl. 0.5% operator reserve)
  SIXUP: 0.23     # Six Up (~, incl. 2% operator reserve)

# Rebate (high-volume only; not realistically retail). Triggered by a single losing
# bet >= HKD 10,000 on the listed pools. Source: research_report.md §2.
rebate:
  enabled: false
  min_losing_bet_hkd: 10000
  rates:            # of the losing amount, local races
    WIN: 0.10
    PLACE: 0.10
    QIN: 0.12
    QPL: 0.12
